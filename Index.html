<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#1a1208" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>🍺 Beer Counter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; user-select: none; -webkit-user-select: none; touch-action: manipulation; }
    #tap-area { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle at 50% 35%, #3a2a10 0%, #1a1208 70%); color: #ffce54; cursor: pointer; transition: background 0.12s ease; padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }
    #tap-area.flash { background: radial-gradient(circle at 50% 35%, #6a4a18 0%, #2a1c0c 70%); }
    #count { font-size: 38vw; font-weight: 800; line-height: 1; letter-spacing: -0.04em; text-shadow: 0 4px 24px rgba(0,0,0,0.5); transition: transform 0.1s ease; }
    #count.pop { transform: scale(1.12); }
    #label { margin-top: 0.4em; font-size: 6vw; font-weight: 600; opacity: 0.85; }
    #hint { position: fixed; bottom: calc(env(safe-area-inset-bottom) + 90px); font-size: 4vw; opacity: 0.4; font-weight: 500; }
    .controls { position: fixed; bottom: calc(env(safe-area-inset-bottom) + 18px); left: 0; right: 0; display: flex; gap: 14px; justify-content: center; z-index: 10; }
    .controls button { background: rgba(255,206,84,0.12); border: 1.5px solid rgba(255,206,84,0.35); color: #ffce54; font-size: 17px; font-weight: 600; padding: 13px 22px; border-radius: 14px; cursor: pointer; backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); }
    .controls button:active { background: rgba(255,206,84,0.28); }
    @keyframes floatUp { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-120px) scale(1.6); } }
    .float { position: fixed; font-size: 9vw; pointer-events: none; animation: floatUp 0.9s ease-out forwards; z-index: 5; }
  </style>
</head>
<body>
  <div id="tap-area">
    <div id="count">0</div>
    <div id="label">beers</div>
    <div id="hint">tap anywhere to add a beer</div>
  </div>
  <div class="controls">
    <button id="undo">↩ Undo</button>
    <button id="reset">Reset</button>
  </div>
  <script>
    const STORAGE_KEY = "beer-count";
    const tapArea = document.getElementById("tap-area");
    const countEl = document.getElementById("count");
    const labelEl = document.getElementById("label");
    const undoBtn = document.getElementById("undo");
    const resetBtn = document.getElementById("reset");
    let count = parseInt(localStorage.getItem(STORAGE_KEY) || "0", 10);
    if (isNaN(count) || count < 0) count = 0;
    function save() { localStorage.setItem(STORAGE_KEY, String(count)); }
    function render() { countEl.textContent = count; labelEl.textContent = count === 1 ? "beer" : "beers"; }
    function buzz(ms) { if (navigator.vibrate) navigator.vibrate(ms); }
    function pop() { countEl.classList.remove("pop"); void countEl.offsetWidth; countEl.classList.add("pop"); tapArea.classList.add("flash"); setTimeout(() => tapArea.classList.remove("flash"), 120); }
    function floatEmoji(x, y) { const el = document.createElement("div"); el.className = "float"; el.textContent = "🍺"; el.style.left = (x - 24) + "px"; el.style.top = (y - 24) + "px"; document.body.appendChild(el); setTimeout(() => el.remove(), 900); }
    function addBeer(x, y) { count++; save(); render(); pop(); buzz(15); if (x != null && y != null) floatEmoji(x, y); }
    tapArea.addEventListener("pointerdown", (e) => { addBeer(e.clientX, e.clientY); });
    undoBtn.addEventListener("click", (e) => { e.stopPropagation(); if (count > 0) { count--; save(); render(); buzz(10); } });
    resetBtn.addEventListener("click", (e) => { e.stopPropagation(); if (count === 0) return; if (confirm("Reset the beer count to 0?")) { count = 0; save(); render(); buzz([10,40,10]); } });
    render();
  </script>
</body>
</html>
